<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>GrammarSmash</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }

    html {
      background: #0a0a18;
      height: 100%;
    }

    body {
      min-height: 100%;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      background: #0a0a18;
      font-family: 'Courier New', monospace;
      color: #eee;
    }

    #game-wrapper {
      position: relative;
      width: 600px;
      zoom: 1.8;
    }

    canvas {
      display: block;
      border-radius: 8px;
      border: 2px solid #1f2937;
    }

    #hud {
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 6px 4px;
      font-size: 13px;
      color: #6b7280;
    }

    #hud-combo {
      color: #facc15;
      font-weight: bold;
      font-size: 14px;
      min-width: 40px;
      text-align: center;
    }

    #hud-level {
      color: #22d3ee;
      font-weight: bold;
      font-size: 13px;
      min-width: 32px;
      text-align: center;
    }

    .level-msg {
      font-size: 12px;
      color: #22d3ee;
    }

    #result {
      position: absolute;
      inset: 0;
      background: rgba(5, 5, 15, 0.94);
      border-radius: 8px;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: flex-start;
      gap: 8px;
      opacity: 0;
      pointer-events: none;
      transition: opacity 0.3s ease;
      padding: 16px 24px;
      overflow-y: auto;
    }

    #result.visible {
      opacity: 1;
      pointer-events: all;
    }

    .fail-reason {
      width: 100%;
      background: rgba(220, 38, 38, 0.15);
      border: 1px solid rgba(220, 38, 38, 0.4);
      border-radius: 6px;
      padding: 12px 16px;
      display: flex;
      flex-direction: column;
      gap: 6px;
      margin-bottom: 4px;
    }

    .fail-label {
      font-size: 14px;
      font-weight: bold;
      color: #fca5a5;
    }

    .fail-sentence {
      font-size: 13px;
      color: #fff;
      font-style: italic;
    }

    .fail-explanation {
      font-size: 12px;
      color: #d1d5db;
      line-height: 1.5;
    }

    .score-msg {
      font-size: 18px;
      font-weight: bold;
      color: #fff;
    }

    .cta-msg {
      font-size: 14px;
      color: #f0c040;
    }

    .buttons {
      display: flex;
      gap: 10px;
      margin-top: 6px;
    }

    .buttons a, .buttons button {
      padding: 9px 20px;
      border-radius: 6px;
      font-size: 14px;
      font-family: inherit;
      cursor: pointer;
      border: none;
      font-weight: bold;
      text-decoration: none;
    }

    #btn-textboi { background: #f0c040; color: #0a0a18; }
    #btn-replay  { background: #1f2937; color: #eee; }

    .best-msg {
      font-size: 14px;
      color: #9ca3af;
    }

    .best-msg.new-record {
      color: #facc15;
      font-weight: bold;
      animation: pulse 0.6s ease 2;
    }

    @keyframes pulse {
      0%, 100% { transform: scale(1); }
      50%       { transform: scale(1.15); }
    }

    .combo-msg {
      font-size: 12px;
      color: #f97316;
    }

    .tip {
      font-size: 11px;
      color: #4b5563;
      margin-top: 2px;
    }

    #nickname-section {
      width: 100%;
      display: none;
      flex-direction: column;
      gap: 8px;
      background: rgba(250, 204, 21, 0.08);
      border: 1px solid rgba(250, 204, 21, 0.3);
      border-radius: 6px;
      padding: 12px 14px;
    }

    .nickname-label {
      font-size: 12px;
      color: #facc15;
      font-weight: bold;
    }

    .nickname-row {
      display: flex;
      gap: 8px;
    }

    #nickname-input {
      flex: 1;
      background: #1f2937;
      border: 1px solid #374151;
      border-radius: 5px;
      color: #eee;
      font-family: inherit;
      font-size: 13px;
      padding: 6px 10px;
      outline: none;
    }

    #nickname-input:focus { border-color: #facc15; }

    #btn-submit-nick {
      background: #facc15;
      color: #0a0a18;
      border: none;
      border-radius: 5px;
      font-family: inherit;
      font-size: 13px;
      font-weight: bold;
      padding: 6px 14px;
      cursor: pointer;
    }

    #leaderboard-section {
      width: 100%;
      display: none;
      flex-direction: column;
      gap: 6px;
    }

    .lb-title {
      font-size: 12px;
      font-weight: bold;
      color: #facc15;
    }

    #lb-rank-msg {
      font-size: 12px;
      color: #4ade80;
      font-weight: bold;
    }

    #lb-list {
      width: 100%;
      max-height: 120px;
      overflow-y: auto;
      display: flex;
      flex-direction: column;
      gap: 3px;
    }

    #lb-list::-webkit-scrollbar { width: 4px; }
    #lb-list::-webkit-scrollbar-thumb { background: #374151; border-radius: 2px; }

    .lb-row {
      display: grid;
      grid-template-columns: 28px 1fr auto;
      gap: 6px;
      align-items: center;
      padding: 4px 8px;
      border-radius: 4px;
      font-size: 11px;
      color: #9ca3af;
    }

    .lb-row.lb-me {
      background: rgba(74, 222, 128, 0.12);
      color: #4ade80;
      font-weight: bold;
    }

    .lb-rank-num { color: #4b5563; font-size: 10px; }
    .lb-row.lb-me .lb-rank-num { color: #4ade80; }
    .lb-score-val { font-weight: bold; text-align: right; }

    #review-list {
      width: 100%;
      max-height: 140px;
      overflow-y: auto;
      display: flex;
      flex-direction: column;
      gap: 6px;
      margin-top: 2px;
    }

    #review-list::-webkit-scrollbar { width: 4px; }
    #review-list::-webkit-scrollbar-thumb { background: #374151; border-radius: 2px; }

    .review-row {
      display: flex;
      gap: 8px;
      align-items: flex-start;
      background: rgba(255,255,255,0.04);
      border-radius: 5px;
      padding: 7px 10px;
    }

    .review-icon { font-size: 13px; flex-shrink: 0; margin-top: 1px; }

    .review-body { display: flex; flex-direction: column; gap: 2px; }

    .review-sentence {
      font-size: 12px;
      color: #e5e7eb;
      font-style: italic;
    }

    .review-exp {
      font-size: 11px;
      color: #9ca3af;
      line-height: 1.4;
    }
  </style>
</head>
<body>
  <div id="game-wrapper">
    <canvas id="canvas" width="600" height="400"></canvas>

    <div id="hud">
      <span id="hud-score">Score: 0</span>
      <span id="hud-level">Lv0</span>
      <span id="hud-combo"></span>
      <span id="hud-best">Best: 0</span>
    </div>

    <div id="result">
      <div class="fail-reason">
        <p class="fail-label"></p>
        <p class="fail-sentence"></p>
        <p class="fail-explanation"></p>
      </div>
      <p class="score-msg"></p>
      <p class="best-msg"></p>
      <p class="combo-msg"></p>
      <p class="level-msg"></p>

      <div id="nickname-section">
        <p class="nickname-label">🏆 Enter your name for the leaderboard (once):</p>
        <div class="nickname-row">
          <input id="nickname-input" type="text" maxlength="20" placeholder="Your name" autocomplete="off" />
          <button id="btn-submit-nick">Submit</button>
        </div>
      </div>

      <div id="leaderboard-section">
        <p class="lb-title">🏆 Leaderboard</p>
        <p id="lb-rank-msg"></p>
        <div id="lb-list"></div>
      </div>

      <div id="review-list"></div>
      <p class="cta-msg">TextBoi fixes this instantly ⚡</p>
      <div class="buttons">
        <a id="btn-textboi" href="https://textboi.ai" target="_blank">Try TextBoi →</a>
        <button id="btn-replay">Play Again</button>
      </div>
      <p class="tip"></p>
    </div>
  </div>

  <script src="game.js"></script>
  <script src="main.js"></script>
</body>
</html>
